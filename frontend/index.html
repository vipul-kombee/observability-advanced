<!DOCTYPE html>
<html>
<head>
  <title>Demo App</title>
</head>
<body>
  <h1>Observability Demo</h1>
  <button onclick="callApi()">Call API</button>

  <script>
    function callApi() {
      fetch("http://localhost:3000/")
        .then(res => res.text())
        .then(console.log)
        .catch(console.error);
    }
  </script>
</body>
</html>
